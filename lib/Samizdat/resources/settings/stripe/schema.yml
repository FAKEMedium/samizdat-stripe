$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "samizdat:settings:stripe"
title: Stripe
description: Stripe payments (operator).
type: object
x-samizdat-audience: operator
x-samizdat-version: 1
properties:
  cardnumber: { type: integer }
  dbtype: { type: string, enum: [postgresql, mysql, redis], default: postgresql }
  currency: { type: string, default: SEK }
  default_env: { type: string, default: test }
  webhook_secret: { type: string, writeOnly: true }
  env:
    type: object
    description: Per-environment publishable and secret keys.
    additionalProperties:
      type: object
      properties:
        publishable_key: { type: string }
        secret_key: { type: string, writeOnly: true }
